<!doctype html>
<html lang="de">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>Etiketten Druck</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>
  <header>
    <span class="today" id="today">Heute: {{ today }}</span>
  </header>

  <main>

    <div class="names">
      {% for name in names %}
      <button class="btn btn-name" data-type="name" data-name="{{ name }}">{{ name }}</button>
      {% endfor %}
    </div>
    <div class="disposal-row">
      <button class="btn btn-step" id="days-minus" type="button" aria-label="Tage verringern">−</button>
      <button class="btn btn-disposal" data-type="disposal">Entsorgen (+<span id="days-label">5</span> Tage)</button>
      <button class="btn btn-step" id="days-plus" type="button" aria-label="Tage erhöhen">+</button>
    </div>
    <button class="btn btn-date" data-type="date">Datum heute</button>

  </main>

  <div id="toast" class="toast"></div>

  <script>
    const toast = document.getElementById('toast');
    let busy = false;

    function showToast(msg, kind) {
      toast.textContent = msg;
      toast.className = 'toast show ' + (kind || '');
    }
    function hideToast() { toast.className = 'toast'; }

    // Angezeigtes Datum live halten – die Kiosk-Seite wird sonst nie neu geladen
    // und würde tagelang das Boot-Datum zeigen. Vom Server geholt (maßgeblich für
    // den Druck) inkl. Warnung, falls die Uhr nicht synchronisiert ist.
    async function updateToday() {
      const el = document.getElementById('today');
      if (!el) return;
      try {
        const d = await (await fetch('/health')).json();
        el.textContent = 'Heute: ' + d.today + (d.synced ? '' : '  ⚠ Uhrzeit nicht synchron – Datum prüfen!');
        el.classList.toggle('warn', !d.synced);
      } catch (e) {
        const dt = new Date(), p = n => String(n).padStart(2, '0');
        el.textContent = 'Heute: ' + p(dt.getDate()) + '.' + p(dt.getMonth() + 1) + '.' + dt.getFullYear();
      }
    }
    updateToday();
    setInterval(updateToday, 60000);

    async function printLabel(btn) {
      if (busy) return;
      busy = true;
      document.querySelectorAll('.btn').forEach(b => b.disabled = true);
      showToast('Druckt…', 'info');
      try {
        const body = { type: btn.dataset.type };
        if (btn.dataset.name) body.name = btn.dataset.name;
        if (btn.dataset.type === 'disposal') body.days = disposalDays;
        const res = await fetch('/print', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body),
        });
        const data = await res.json();
        showToast(data.ok ? '✓ ' + data.message : '✗ ' + data.message, data.ok ? 'ok' : 'err');
      } catch (e) {
        showToast('✗ Verbindungsfehler', 'err');
      } finally {
        busy = false;
        document.querySelectorAll('.btn').forEach(b => b.disabled = false);
        setTimeout(hideToast, 2500);
      }
    }

    // ── Weck-Tap abfangen ──────────────────────────────────────────────
    // swayidle schaltet den Bildschirm nach 30s aus, schluckt aber keine
    // Eingaben. Die erste Berührung nach langer Inaktivität weckt nur den
    // Schirm und darf keinen Druck auslösen. Kriterium wie bei swayidle:
    // Zeit seit letzter Berührung. Guard etwas unter dem swayidle-Timeout.
    let lastTouch = Date.now();
    let swallowClick = false;
    const WAKE_GUARD_MS = 28000;   // < swayidle-Timeout (30s in labwc/autostart)

    window.addEventListener('pointerdown', () => {
      const idle = Date.now() - lastTouch;
      lastTouch = Date.now();
      swallowClick = idle >= WAKE_GUARD_MS;
    }, true);

    window.addEventListener('click', (e) => {
      if (swallowClick) {
        e.stopPropagation();
        e.preventDefault();
        swallowClick = false;
      }
    }, true);

    // Nur Buttons mit data-type lösen einen Druck aus (nicht die +/- Stepper).
    document.querySelectorAll('.btn[data-type]').forEach(btn => {
      btn.addEventListener('click', () => printLabel(btn));
    });

    // ── Entsorgungs-Tage per +/- verstellen ────────────────────────────
    // Nur zur Laufzeit gehalten; nach Neustart wieder Default (5 Tage).
    const DEFAULT_DAYS = 5, MIN_DAYS = 1, MAX_DAYS = 365;
    let disposalDays = DEFAULT_DAYS;
    const daysLabel = document.getElementById('days-label');
    function setDays(n) {
      disposalDays = Math.min(MAX_DAYS, Math.max(MIN_DAYS, n));
      daysLabel.textContent = disposalDays;
    }
    document.getElementById('days-minus').addEventListener('click', () => setDays(disposalDays - 1));
    document.getElementById('days-plus').addEventListener('click', () => setDays(disposalDays + 1));
  </script>
</body>

</html>
